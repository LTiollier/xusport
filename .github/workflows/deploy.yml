name: CI/CD Multi-Stack (Next.js & Laravel)

on:
  push:
    branches: [ main ]

jobs:
  # --- JOB 1 : BUILD FRONTEND ---
  build-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install & Build
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          HOSTNAME: "127.0.0.1"

      - name: Prepare Artifact
        run: |
          mkdir -p node_deploy

          # Copie du contenu de standalone (inclut .next/server, node_modules, server.js, package.json)
          # cp -r préserve les dossiers cachés comme .next/ contrairement à rsync avec certains flags
          cp -r frontend/.next/standalone/. node_deploy/

          # Ajout des fichiers statiques et publics requis en standalone
          # .next/static → assets JS/CSS côté client
          # public/      → fichiers servis directement (images, manifests, sw.js…)
          mkdir -p node_deploy/.next/static
          cp -r frontend/.next/static/. node_deploy/.next/static/

          if [ -d "frontend/public" ]; then
            mkdir -p node_deploy/public
            cp -r frontend/public/. node_deploy/public/
          fi

          # Empaqueter en tar pour préserver les fichiers cachés (.next/, etc.)
          # actions/upload-artifact ignore les dotfiles par défaut
          tar -czf node-build.tar.gz -C node_deploy .

      - name: Upload Node Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-build
          path: node-build.tar.gz

  # --- JOB 2 : BUILD LARAVEL ---
  build-laravel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, bcmath, gd, zip, dom, curl, libxml, openssl

      - name: Install Composer Dependencies
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader

      - name: Upload Laravel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: laravel-build
          path: |
            backend/
            !backend/bootstrap/cache/*.php
            !backend/storage/framework/views/*
            !backend/storage/framework/cache/data/*
            !backend/storage/framework/sessions/*
            !backend/storage/logs/*

  # --- JOB 3 : DEPLOY ---
  deploy:
    needs: [build-node, build-laravel]
    runs-on: ubuntu-latest
    steps:
      - name: Download Node Build
        uses: actions/download-artifact@v4
        with:
          name: node-build
          path: ./deploy-node-archive

      - name: Extract Node Build
        run: |
          mkdir -p ./deploy-node
          tar -xzf ./deploy-node-archive/node-build.tar.gz -C ./deploy-node

      - name: Download Laravel Build
        uses: actions/download-artifact@v4
        with:
          name: laravel-build
          path: ./deploy-laravel

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          if_key_exists: fail

      - name: Get Public IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Removing all whitelisted IP
        run: |
          curl -sm 45 -H'Authorization: cpanel ${{ secrets.SSH_USER }}:${{ secrets.CPANEL_API_TOKEN }}' \
          'https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/remove_all'

      - name: Whitelist IP on o2switch
        run: |
          # On whiteliste le port 22 qui est celui accepté par l'API et utilisé pour rsync
          curl -sm 45 -H'Authorization: cpanel ${{ secrets.SSH_USER }}:${{ secrets.CPANEL_API_TOKEN }}' \
          "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/add?address=${{ steps.ip.outputs.ipv4 }}&port=22"

      - name: Whitelist No-IP (accès local)
        run: |
          # Résolution DNS du hostname No-IP pour whitelister l'IP de la machine locale
          NOIP_ADDR=$(dig +short ${{ secrets.NOIP_HOSTNAME }} | tail -n1)
          curl -sm 45 -H'Authorization: cpanel ${{ secrets.SSH_USER }}:${{ secrets.CPANEL_API_TOKEN }}' \
          "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/add?address=${NOIP_ADDR}&port=22"

      - name: Making sure the IP is whitelisted
        run: |
          curl -sm 45 -H'Authorization: cpanel ${{ secrets.SSH_USER }}:${{ secrets.CPANEL_API_TOKEN }}' \
          "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/list" | grep "${{ steps.ip.outputs.ipv4 }}"

      - name: Deploy Frontend via rsync
        run: |
          rsync -avz --timeout=60 -e "ssh -p 22 -o StrictHostKeyChecking=no" \
            --delete \
            --exclude '.htaccess' \
            --exclude '.env' \
            --exclude 'backend/' \
            ./deploy-node/ \
            ${{ secrets.SSH_USER }}@${{ secrets.CPANEL_SERVER }}:/home/tile6213/xusport.ltiollier.fr/

      - name: Trigger Node.js Restart
        run: |
          ssh -p 22 -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.CPANEL_SERVER }} \
            "mkdir -p /home/tile6213/xusport.ltiollier.fr/tmp && touch /home/tile6213/xusport.ltiollier.fr/tmp/restart.txt"

      - name: Deploy Backend via rsync
        run: |
          rsync -avz --timeout=60 -e "ssh -p 22 -o StrictHostKeyChecking=no" \
            --delete \
            --exclude '.env' \
            --exclude 'bootstrap/cache/*.php' \
            ./deploy-laravel/ \
            ${{ secrets.SSH_USER }}@${{ secrets.CPANEL_SERVER }}:/home/tile6213/api.xusport.ltiollier.fr/

      - name: Post-deploy Laravel setup
        run: |
          ssh -p 22 -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.CPANEL_SERVER }} bash << 'EOF'
            set -e
            APP=/home/tile6213/api.xusport.ltiollier.fr

            # Garantir l'existence des dossiers de stockage (framework peut les supprimer)
            mkdir -p $APP/storage/framework/{views,sessions,cache/data}
            mkdir -p $APP/storage/app/{private,public}
            mkdir -p $APP/storage/logs
            mkdir -p $APP/bootstrap/cache

            # Permissions lecture/écriture pour le processus PHP
            chmod -R 775 $APP/storage $APP/bootstrap/cache

            # Regénérer les caches avec les vrais chemins de prod
            cd $APP && php artisan config:cache
            cd $APP && php artisan route:cache
            cd $APP && php artisan view:cache
          EOF
