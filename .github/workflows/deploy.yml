name: CI/CD Multi-Stack (Next.js & Laravel)

on:
  push:
    branches: [ main ]

jobs:
  # --- JOB 1 : BUILD FRONTEND ---
  build-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install & Build
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          HOSTNAME: "127.0.0.1"

      - name: Prepare Artifact
        run: |
          mkdir -p node_deploy
          # Copy everything from standalone to the root of the artifact
          cp -r frontend/.next/standalone/. node_deploy/
          # Copy static and public to the root as well
          # Next.js standalone expects these in the root or next to server.js
          mkdir -p node_deploy/.next/static
          cp -r frontend/.next/static/. node_deploy/.next/static/
          cp -r frontend/public node_deploy/public

      - name: Upload Node Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-build
          path: node_deploy/

  # --- JOB 2 : BUILD LARAVEL ---
  build-laravel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, bcmath, gd, zip, dom, curl, libxml, openssl

      - name: Install Composer Dependencies
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader

      - name: Upload Laravel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: laravel-build
          path: backend/

  # --- JOB 3 : DEPLOY ---
  deploy:
    needs: [build-node, build-laravel]
    runs-on: ubuntu-latest
    steps:
      - name: Download Node Build
        uses: actions/download-artifact@v4
        with:
          name: node-build
          path: ./deploy-node

      - name: Download Laravel Build
        uses: actions/download-artifact@v4
        with:
          name: laravel-build
          path: ./deploy-laravel

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          if_key_exists: fail

      - name: Get Public IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Removing all whitelisted IP
        run: |
          curl -sm 45 -H'Authorization: cpanel ${{ secrets.SSH_USER }}:${{ secrets.CPANEL_API_TOKEN }}' \
          'https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/remove_all'

      - name: Whitelist IP on o2switch
        run: |
          # On whiteliste le port 22 qui est celui accepté par l'API et utilisé pour rsync
          curl -sm 45 -H'Authorization: cpanel ${{ secrets.SSH_USER }}:${{ secrets.CPANEL_API_TOKEN }}' \
          "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/add?address=${{ steps.ip.outputs.ipv4 }}&port=22"

      - name: Making sure the IP is whitelisted
        run: |
          curl -sm 45 -H'Authorization: cpanel ${{ secrets.SSH_USER }}:${{ secrets.CPANEL_API_TOKEN }}' \
          "https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/list" | grep "${{ steps.ip.outputs.ipv4 }}"

      - name: Deploy Frontend via rsync
        run: |
          rsync -avz --timeout=60 -e "ssh -p 22 -o StrictHostKeyChecking=no" \
            --delete \
            --exclude '.htaccess' \
            --exclude '.env' \
            ./deploy-node/ \
            ${{ secrets.SSH_USER }}@${{ secrets.CPANEL_SERVER }}:/home/tile6213/xusport.ltiollier.fr/

      - name: Trigger Node.js Restart
        run: |
          ssh -p 22 -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.CPANEL_SERVER }} \
            "mkdir -p /home/tile6213/xusport.ltiollier.fr/tmp && touch /home/tile6213/xusport.ltiollier.fr/tmp/restart.txt"

      - name: Deploy Backend via rsync
        run: |
          rsync -avz --timeout=60 -e "ssh -p 22 -o StrictHostKeyChecking=no" \
            --delete \
            --exclude '.htaccess' \
            --exclude '.env' \
            ./deploy-laravel/ \
            ${{ secrets.SSH_USER }}@${{ secrets.CPANEL_SERVER }}:/home/tile6213/xusport.ltiollier.fr/backend/
