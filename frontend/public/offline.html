<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>XuSport · hors ligne</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      height: 100%;
      background: linear-gradient(135deg, #0F172A, #06081A);
      color: #E2E8F0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }
    .badge {
      width: 76px; height: 76px;
      border-radius: 22px;
      background: linear-gradient(135deg, #8B5CF6, #7C3AED);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 32px; color: #fff; letter-spacing: -1px;
      box-shadow: 0 16px 48px rgba(139,92,246,0.45);
    }
    h1 { font-size: 18px; margin: 8px 0 0; font-weight: 700; }
    p { color: #94A3B8; font-size: 13px; max-width: 320px; line-height: 1.5; }
    button {
      margin-top: 8px;
      background: #7C3AED;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="badge">XS</div>
  <h1>Hors ligne</h1>
  <p>L'application a besoin du réseau pour cette page. Tes séances et tes records restent disponibles depuis l'écran d'accueil.</p>
  <button onclick="location.href='/'">Retour à l'accueil</button>
</body>
</html>
