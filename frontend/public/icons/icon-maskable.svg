<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Maskable safe area is the central 80% (~410x410). Background fills the
       full canvas so the launcher can crop without showing transparency. -->
  <rect width="512" height="512" fill="url(#g)"/>
  <text x="256" y="304" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Inter, sans-serif"
        font-weight="800" font-size="180" fill="#fff" letter-spacing="-6">XS</text>
</svg>
