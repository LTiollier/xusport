services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: xusport
      POSTGRES_USER: xusport
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xusport -d xusport"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: xusport
      DB_USERNAME: xusport
      DB_PASSWORD: secret
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      target: deps
    command: sh -c "[ -f node_modules/.bin/next ] || npm ci && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_vendor:
  frontend_node_modules:
  frontend_next:
